<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CSS link -->
     <link rel="stylesheet" href="profile.css">
     <!-- Fontawesome link -->
      <script src="https://kit.fontawesome.com/1d68a8fcd4.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <div class="profile-card">
        <div class="starting-part">
        <div class="profile-image">
            <img src="./Images/WhatsApp Image 2026-02-26 at 11.37.12 AM (1).webp" alt="Billy Gathecere">
        </div>
        <div class="profile-name">
            <h1>Billy Gathecere</h1>
        </div>
        <div class="profile-job">
            <h2>Frontend Developer</h2>
        </div>
        <div class="profile-social">
            <div class="stats-1">
                <h3>
                    2.4k
                    <span>Followers</span>
                </h3>
            </div>
            <div class="stats-2">
                <h3>
                    1.2k
                    <span>Following</span>
                </h3>
            </div>
            <div class="stats-3">
                <h3>
                    3.2k
                    <span>Likes</span>
                </h3>
            </div>
        </div>
        <div class="profile-btn">
            <button class="btn-1">Follow</button>
        </div>
        </div>
        <div class="middle-part">
        <div class="profile-header">
            <span>Efficient Frontend Developer with 3 years of experience</span>
        </div>
        <div class="projects">
            <div class="project-1">
            <img src="./Images/Clip Board Landing page.webp" alt="project 1">
            </div>
            <div class="project-2">
            <img src="./Images/Huddle Landing Page.webp" alt="project 2">
            </div>
            <div class="project-3">
            <img src="./Images/Social profile links.webp" alt="project 3">
            </div>
            <div class="project-4">
            <img src="./Images/Bento grid.webp" alt="project 4">
            </div>

        </div>
        </div>
    </div>
</body>
</html>
